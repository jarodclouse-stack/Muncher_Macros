<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/app-icon.png?v=8" />
    <link rel="manifest" href="/manifest.json?v=8" />
    <link rel="apple-touch-icon" href="/app-icon.png?v=8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#080A0F" id="theme-meta" />
    <title>Macro Munchers</title>
    <meta name="description" content="Macro Munchers is an AI-powered nutrition tracker that uses photo recognition to log meals and track your macros effortlessly." />
    <meta name="application-name" content="Macro Munchers" />

    <!-- Open Graph -->
    <meta property="og:title" content="Macro Munchers" />
    <meta property="og:description" content="AI-powered nutrition tracker — snap a photo, get your macros." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/app-icon.png?v=8" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Macro Munchers" />
    <meta name="twitter:description" content="AI-powered nutrition tracker — snap a photo, get your macros." />
    <meta name="twitter:image" content="/app-icon.png?v=8" />

    <script>
      // SMART PURGE: Kill stale service workers and force fresh code
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(registrations => {
          for(let registration of registrations) { registration.unregister(); }
        });
      }
      if ('caches' in window) {
        caches.keys().then(names => {
          for (let name of names) caches.delete(name);
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
